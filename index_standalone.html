<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BharatBank</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;font-family:'Segoe UI',sans-serif;color:#ccd6f6}
input,select{outline:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

const STOCKS=[
  {id:"RELIANCE",name:"Reliance Industries",price:2450,sector:"Energy"},
  {id:"TCS",name:"Tata Consultancy",price:3780,sector:"IT"},
  {id:"HDFC",name:"HDFC Bank",price:1620,sector:"Finance"},
  {id:"INFOSYS",name:"Infosys Ltd",price:1480,sector:"IT"},
  {id:"WIPRO",name:"Wipro Ltd",price:420,sector:"IT"},
  {id:"BAJAJ",name:"Bajaj Finance",price:6800,sector:"Finance"},
];

const LOAN_TYPES=[
  {id:"home",name:"Home Loan",rate:8.5,maxTenure:240,minAmount:500000,icon:"🏠"},
  {id:"personal",name:"Personal Loan",rate:14.0,maxTenure:60,minAmount:50000,icon:"💳"},
  {id:"car",name:"Car Loan",rate:9.5,maxTenure:84,minAmount:300000,icon:"🚗"},
  {id:"education",name:"Education Loan",rate:10.5,maxTenure:120,minAmount:200000,icon:"🎓"},
];

function calcEMI(p,r,m){const i=r/100/12;if(i===0)return p/m;return(p*i*Math.pow(1+i,m))/(Math.pow(1+i,m)-1);}

function fmt(n){
  if(n>=10000000)return"₹"+(n/10000000).toFixed(2)+"Cr";
  if(n>=100000)return"₹"+(n/100000).toFixed(2)+"L";
  return"₹"+Math.round(n).toLocaleString("en-IN");
}

function Card({children,style}){return<div style={{background:"#1a1f35",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:20,...style}}>{children}</div>}
function StatCard({label,value,color="#f5a623",sub}){return<div style={{background:"#141927",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:16}}><div style={{fontSize:12,color:"#8892b0",marginBottom:6}}>{label}</div><div style={{fontSize:20,fontWeight:700,color}}>{value}</div>{sub&&<div style={{fontSize:11,color:"#4a5568",marginTop:4}}>{sub}</div>}</div>}

function App(){
  const[name,setName]=useState("");
  const[started,setStarted]=useState(false);
  const[balance,setBalance]=useState(500000);
  const[fdBalance,setFdBalance]=useState(0);
  const[loans,setLoans]=useState([]);
  const[portfolio,setPortfolio]=useState({});
  const[transactions,setTransactions]=useState([]);
  const[prices,setPrices]=useState(STOCKS.reduce((a,s)=>({...a,[s.id]:s.price}),{}));
  const[creditScore,setCreditScore]=useState(750);
  const[screen,setScreen]=useState("dashboard");
  const[modal,setModal]=useState(null);
  const[inputs,setInputs]=useState({});
  const[notifs,setNotifs]=useState([]);

  const notify=(msg,type="info")=>{
    const id=Date.now();
    setNotifs(n=>[...n.slice(-4),{id,msg,type}]);
    setTimeout(()=>setNotifs(n=>n.filter(x=>x.id!==id)),3000);
  };

  const addTxn=(desc,amount,type)=>setTransactions(t=>[{id:Date.now(),desc,amount,type,date:new Date().toLocaleDateString("en-IN")},...t.slice(0,49)]);

  useEffect(()=>{
    if(!started)return;
    const iv=setInterval(()=>{
      setPrices(p=>{
        const np={...p};
        STOCKS.forEach(s=>{const c=(Math.random()-0.48)*0.04;np[s.id]=Math.max(50,Math.round(np[s.id]*(1+c)));});
        return np;
      });
      setLoans(ls=>ls.map(l=>{
        if(l.remainingMonths>0){
          setBalance(b=>{if(b>=l.emi)return Math.round(b-l.emi);return b;});
          return{...l,remainingMonths:l.remainingMonths-1};
        }
        return l;
      }));
    },3000);
    return()=>clearInterval(iv);
  },[started]);

  const portfolioValue=Object.entries(portfolio).reduce((s,[id,q])=>s+q*prices[id],0);
  const netWorth=balance+portfolioValue+fdBalance;

  if(!started){return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f1117,#1a1f35,#0f1117)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:"#fff",padding:"2rem",animation:"fadeIn 0.6s ease"}}>
        <div style={{fontSize:72,marginBottom:8}}>🏦</div>
        <h1 style={{fontSize:44,fontWeight:700,background:"linear-gradient(90deg,#f5a623,#f7c948)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"0 0 8px"}}>BharatBank</h1>
        <p style={{color:"#8892b0",fontSize:16,marginBottom:40}}>India's Premier Banking Simulation</p>
        <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(245,166,35,0.3)",borderRadius:16,padding:"2rem",maxWidth:380,margin:"0 auto"}}>
          <p style={{color:"#ccd6f6",marginBottom:20,fontSize:14}}>Start with ₹5,00,000 • Loans • Stocks • UPI • FD</p>
          <input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&name.trim()&&setStarted(true)} placeholder="Enter your name" style={{width:"100%",padding:"12px 16px",borderRadius:10,border:"1px solid rgba(245,166,35,0.4)",background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:16,marginBottom:16}}/>
          <button onClick={()=>name.trim()&&setStarted(true)} style={{width:"100%",padding:14,borderRadius:10,background:"linear-gradient(90deg,#f5a623,#f7c948)",border:"none",color:"#0f1117",fontWeight:700,fontSize:16,cursor:"pointer"}}>Open Account →</button>
        </div>
      </div>
    </div>
  );}

  const doUPI=()=>{
    const amt=parseFloat(inputs.upiAmount);
    if(!amt||amt<=0||!inputs.toUpi?.trim())return notify("Enter valid UPI details","error");
    if(amt>balance)return notify("Insufficient balance!","error");
    setBalance(b=>Math.round(b-amt));
    addTxn(`UPI to ${inputs.toUpi}`,amt,"debit");
    notify(`${fmt(amt)} sent to ${inputs.toUpi}`,"success");
    setModal(null);setInputs({});
  };

  const applyLoan=()=>{
    const lt=LOAN_TYPES.find(l=>l.id===inputs.loanType);
    const amt=parseFloat(inputs.loanAmount);
    const ten=parseInt(inputs.loanTenure);
    if(!lt||!amt||!ten)return notify("Fill all fields","error");
    if(amt<lt.minAmount)return notify(`Min: ${fmt(lt.minAmount)}`,"error");
    const emi=calcEMI(amt,lt.rate,ten);
    setLoans(ls=>[...ls,{id:`L${Date.now()}`,type:lt.name,icon:lt.icon,principal:amt,emi:Math.round(emi),rate:lt.rate,totalMonths:ten,remainingMonths:ten}]);
    setBalance(b=>Math.round(b+amt));
    setCreditScore(c=>Math.max(300,c-15));
    addTxn(`${lt.name} disbursed`,amt,"credit");
    notify(`Approved! EMI: ${fmt(emi)}/mo`,"success");
    setModal(null);setInputs({});
  };

  const buyStock=()=>{
    const qty=parseInt(inputs.stockQty)||1;
    const sid=inputs.selectedStock;
    if(!sid)return notify("Select a stock","error");
    const total=prices[sid]*qty;
    if(total>balance)return notify("Insufficient balance!","error");
    setBalance(b=>Math.round(b-total));
    setPortfolio(p=>({...p,[sid]:(p[sid]||0)+qty}));
    addTxn(`Bought ${qty}x ${sid}`,total,"debit");
    notify(`Bought ${qty} shares of ${sid}`,"success");
    setModal(null);setInputs({});
  };

  const sellStock=(sid)=>{
    const qty=parseInt(inputs[`sell_${sid}`])||1;
    const held=portfolio[sid]||0;
    if(qty>held)return notify("Not enough shares","error");
    const total=prices[sid]*qty;
    setBalance(b=>Math.round(b+total));
    setPortfolio(p=>{const np={...p,[sid]:held-qty};if(np[sid]===0)delete np[sid];return np;});
    addTxn(`Sold ${qty}x ${sid}`,total,"credit");
    notify(`Sold for ${fmt(total)}`,"success");
  };

  const depositFD=()=>{
    const amt=parseFloat(inputs.fdAmount);
    const months=parseInt(inputs.fdMonths)||12;
    if(!amt||amt>balance)return notify("Invalid amount","error");
    const mat=amt*Math.pow(1+0.07/12,months);
    setBalance(b=>Math.round(b-amt));
    setFdBalance(f=>Math.round(f+mat));
    addTxn(`FD for ${months}mo`,amt,"debit");
    notify(`FD @ 7% p.a. created`,"success");
    setModal(null);setInputs({});
  };

  const screens={
    dashboard:(
      <div style={{animation:"fadeIn 0.3s ease"}}>
        <h2 style={{color:"#fff",marginBottom:20,fontSize:22}}>Welcome back, {name} 👋</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:12,marginBottom:24}}>
          <StatCard label="Account Balance" value={fmt(balance)} color="#f5a623"/>
          <StatCard label="Net Worth" value={fmt(netWorth)} color="#68d391"/>
          <StatCard label="Portfolio" value={fmt(portfolioValue)} color="#63b3ed" sub={`${Object.keys(portfolio).length} stocks`}/>
          <StatCard label="Credit Score" value={creditScore} color={creditScore>700?"#68d391":"#fc8181"} sub={creditScore>750?"Excellent":creditScore>650?"Good":"Fair"}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:12,marginBottom:24}}>
          {[["💸","Send Money (UPI)","#805ad5",()=>setModal("upi")],["🏛","Apply for Loan","#e53e3e",()=>setModal("loan")],["📈","Buy Stocks","#38a169",()=>setModal("stock")],["🏦","Fixed Deposit","#dd6b20",()=>setModal("fd")]].map(([icon,label,color,action])=>(
            <button key={label} onClick={action} style={{background:`${color}22`,border:`1px solid ${color}55`,borderRadius:12,padding:18,cursor:"pointer",display:"flex",alignItems:"center",gap:12,color:"#fff",fontSize:14,fontWeight:500,textAlign:"left"}}>
              <span style={{fontSize:28}}>{icon}</span>{label}
            </button>
          ))}
        </div>
        {loans.filter(l=>l.remainingMonths>0).length>0&&(
          <Card>
            <h3 style={{color:"#fc8181",marginBottom:12,fontSize:15}}>Active EMIs</h3>
            {loans.filter(l=>l.remainingMonths>0).map(l=>(
              <div key={l.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <span>{l.icon} {l.type}</span>
                <span style={{color:"#fc8181"}}>{fmt(l.emi)}/mo · {l.remainingMonths} left</span>
              </div>
            ))}
          </Card>
        )}
      </div>
    ),
    accounts:(
      <div style={{animation:"fadeIn 0.3s ease"}}>
        <h2 style={{color:"#fff",marginBottom:20}}>My Accounts</h2>
        <div style={{display:"grid",gap:16,marginBottom:20}}>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:12,color:"#8892b0"}}>Savings Account · ACC001</div><div style={{fontSize:26,fontWeight:700,color:"#f5a623",margin:"4px 0"}}>{fmt(balance)}</div><div style={{fontSize:12,color:"#8892b0"}}>UPI: player@bharatbank</div></div>
              <button onClick={()=>setModal("upi")} style={{padding:"10px 18px",background:"#805ad5",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontWeight:600}}>Send UPI 💸</button>
            </div>
          </Card>
          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:12,color:"#8892b0"}}>Fixed Deposits</div><div style={{fontSize:26,fontWeight:700,color:"#f5a623",margin:"4px 0"}}>{fmt(fdBalance)}</div><div style={{fontSize:12,color:"#68d391"}}>7% p.a. interest</div></div>
              <button onClick={()=>setModal("fd")} style={{padding:"10px 18px",background:"#dd6b2033",border:"1px solid #dd6b2055",borderRadius:8,color:"#dd6b20",cursor:"pointer",fontWeight:600}}>+ New FD</button>
            </div>
          </Card>
        </div>
      </div>
    ),
    loans:(
      <div style={{animation:"fadeIn 0.3s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{color:"#fff"}}>Loans & EMI</h2>
          <button onClick={()=>setModal("loan")} style={{padding:"10px 20px",background:"#e53e3e33",border:"1px solid #e53e3e55",borderRadius:10,color:"#fc8181",cursor:"pointer",fontWeight:600}}>+ Apply Loan</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:24}}>
          {LOAN_TYPES.map(lt=>(
            <div key={lt.id} style={{background:"#141927",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:16}}>
              <div style={{fontSize:28}}>{lt.icon}</div>
              <div style={{color:"#fff",fontWeight:600,marginTop:8}}>{lt.name}</div>
              <div style={{color:"#f5a623",fontSize:13,marginTop:4}}>{lt.rate}% p.a.</div>
              <div style={{color:"#8892b0",fontSize:12}}>Up to {lt.maxTenure} months</div>
            </div>
          ))}
        </div>
        {loans.length===0?<Card><p style={{color:"#4a5568",textAlign:"center"}}>No active loans yet.</p></Card>:
          <div style={{display:"grid",gap:12}}>
            {loans.map(l=>{
              const prog=((l.totalMonths-l.remainingMonths)/l.totalMonths)*100;
              return(
                <Card key={l.id}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                    <span><span style={{fontSize:20}}>{l.icon}</span> <span style={{color:"#fff",fontWeight:600}}>{l.type}</span></span>
                    <span style={{color:l.remainingMonths===0?"#68d391":"#fc8181",fontSize:12}}>{l.remainingMonths===0?"✓ Closed":`${l.remainingMonths} months left`}</span>
                  </div>
                  <div style={{display:"flex",gap:24,fontSize:13,marginBottom:12}}>
                    <div><div style={{color:"#8892b0"}}>Principal</div><div style={{color:"#f5a623"}}>{fmt(l.principal)}</div></div>
                    <div><div style={{color:"#8892b0"}}>EMI</div><div style={{color:"#fc8181"}}>{fmt(l.emi)}/mo</div></div>
                    <div><div style={{color:"#8892b0"}}>Rate</div><div style={{color:"#ccd6f6"}}>{l.rate}%</div></div>
                  </div>
                  <div style={{background:"#0f1117",borderRadius:4,height:6,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${prog}%`,background:"linear-gradient(90deg,#f5a623,#f7c948)",transition:"width 0.5s"}}/>
                  </div>
                  <div style={{fontSize:11,color:"#4a5568",marginTop:4}}>{prog.toFixed(0)}% repaid</div>
                </Card>
              );
            })}
          </div>
        }
      </div>
    ),
    stocks:(
      <div style={{animation:"fadeIn 0.3s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{color:"#fff"}}>Stock Market 📈</h2>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#8892b0"}}>Portfolio Value</div><div style={{color:"#68d391",fontWeight:700,fontSize:16}}>{fmt(portfolioValue)}</div></div>
        </div>
        <div style={{display:"grid",gap:10}}>
          {STOCKS.map(stock=>{
            const p=prices[stock.id];
            const held=portfolio[stock.id]||0;
            const chg=((p-stock.price)/stock.price*100).toFixed(1);
            const up=p>=stock.price;
            return(
              <Card key={stock.id} style={{padding:14}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:120}}>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontWeight:700,color:"#fff"}}>{stock.id}</span>
                      <span style={{fontSize:10,color:"#8892b0",background:"#ffffff10",padding:"2px 8px",borderRadius:4}}>{stock.sector}</span>
                    </div>
                    <div style={{fontSize:12,color:"#8892b0"}}>{stock.name}</div>
                  </div>
                  <div style={{textAlign:"right",minWidth:90}}>
                    <div style={{color:"#fff",fontWeight:600}}>₹{p.toLocaleString("en-IN")}</div>
                    <div style={{fontSize:12,color:up?"#68d391":"#fc8181"}}>{up?"▲":"▼"} {Math.abs(chg)}%</div>
                  </div>
                  <button onClick={()=>{setModal("stock");setInputs({selectedStock:stock.id,stockQty:1});}} style={{padding:"6px 12px",background:"#38a16933",border:"1px solid #38a16955",borderRadius:8,color:"#68d391",cursor:"pointer",fontSize:12}}>Buy</button>
                  {held>0&&<>
                    <span style={{fontSize:12,color:"#8892b0"}}>{held} held</span>
                    <input value={inputs[`sell_${stock.id}`]||""} onChange={e=>setInputs({...inputs,[`sell_${stock.id}`]:e.target.value})} placeholder="qty" type="number" style={{width:48,padding:"4px 6px",background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"#fff",fontSize:12}}/>
                    <button onClick={()=>sellStock(stock.id)} style={{padding:"6px 10px",background:"#e53e3e33",border:"1px solid #e53e3e55",borderRadius:8,color:"#fc8181",cursor:"pointer",fontSize:12}}>Sell</button>
                  </>}
                </div>
              </Card>
            );
          })}
        </div>
      </div>
    ),
    txns:(
      <div style={{animation:"fadeIn 0.3s ease"}}>
        <h2 style={{color:"#fff",marginBottom:20}}>Transactions</h2>
        {transactions.length===0?<Card><p style={{color:"#4a5568",textAlign:"center"}}>No transactions yet.</p></Card>:
          <div style={{display:"grid",gap:8}}>
            {transactions.map(t=>(
              <div key={t.id} style={{background:"#141927",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{color:"#ccd6f6",fontSize:14}}>{t.desc}</div><div style={{color:"#4a5568",fontSize:12}}>{t.date}</div></div>
                <div style={{color:t.type==="credit"?"#68d391":"#fc8181",fontWeight:600,fontSize:15}}>{t.type==="credit"?"+":"-"}{fmt(t.amount)}</div>
              </div>
            ))}
          </div>
        }
      </div>
    ),
  };

  const ltype=LOAN_TYPES.find(l=>l.id===inputs.loanType);
  const emi=ltype&&inputs.loanAmount&&inputs.loanTenure?calcEMI(parseFloat(inputs.loanAmount),ltype.rate,parseInt(inputs.loanTenure)):null;
  const fdAmt=parseFloat(inputs.fdAmount)||0;
  const fdMo=parseInt(inputs.fdMonths)||12;
  const fdMat=fdAmt*Math.pow(1+0.07/12,fdMo);
  const stockPrice=inputs.selectedStock?prices[inputs.selectedStock]:0;
  const stockQty=parseInt(inputs.stockQty)||1;

  return(
    <div style={{minHeight:"100vh",background:"#0f1117"}}>
      <nav style={{background:"#1a1f35",borderBottom:"1px solid rgba(245,166,35,0.2)",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🏦</span>
          <span style={{fontWeight:700,color:"#f5a623",fontSize:18}}>BharatBank</span>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {[["dashboard","🏠","Dashboard"],["accounts","💰","Accounts"],["loans","🏛","Loans"],["stocks","📈","Stocks"],["txns","📋","History"]].map(([s,icon,label])=>(
            <button key={s} onClick={()=>setScreen(s)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:screen===s?"rgba(245,166,35,0.15)":"transparent",color:screen===s?"#f5a623":"#8892b0",cursor:"pointer",fontSize:13}}>
              {icon} {label}
            </button>
          ))}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:"#8892b0"}}>{name}</div>
          <div style={{fontSize:13,color:"#f5a623",fontWeight:600}}>{fmt(balance)}</div>
        </div>
      </nav>
      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>
        {screens[screen]}
      </div>

      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div style={{background:"#1a1f35",border:"1px solid rgba(245,166,35,0.3)",borderRadius:16,padding:24,width:"100%",maxWidth:420,animation:"fadeIn 0.2s ease"}}>
            {modal==="upi"&&<>
              <h3 style={{color:"#fff",marginBottom:20}}>💸 Send via UPI</h3>
              <label style={{color:"#8892b0",fontSize:13}}>UPI ID or Phone Number</label>
              <input value={inputs.toUpi||""} onChange={e=>setInputs({...inputs,toUpi:e.target.value})} placeholder="name@upi or 9876543210" style={{width:"100%",padding:12,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,marginTop:6,marginBottom:14}}/>
              <label style={{color:"#8892b0",fontSize:13}}>Amount (₹)</label>
              <input value={inputs.upiAmount||""} onChange={e=>setInputs({...inputs,upiAmount:e.target.value})} type="number" placeholder="0" style={{width:"100%",padding:12,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:20,marginTop:6,marginBottom:20}}/>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setModal(null)} style={{flex:1,padding:12,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#8892b0",cursor:"pointer"}}>Cancel</button>
                <button onClick={doUPI} style={{flex:2,padding:12,background:"#805ad5",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}}>Send Money 💸</button>
              </div>
            </>}
            {modal==="loan"&&<>
              <h3 style={{color:"#fff",marginBottom:20}}>🏛 Apply for Loan</h3>
              <label style={{color:"#8892b0",fontSize:13}}>Loan Type</label>
              <select value={inputs.loanType||""} onChange={e=>setInputs({...inputs,loanType:e.target.value})} style={{width:"100%",padding:12,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,marginTop:6,marginBottom:12}}>
                <option value="">Select type</option>
                {LOAN_TYPES.map(lt=><option key={lt.id} value={lt.id}>{lt.icon} {lt.name} @ {lt.rate}%</option>)}
              </select>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div>
                  <label style={{color:"#8892b0",fontSize:13}}>Amount (₹)</label>
                  <input value={inputs.loanAmount||""} onChange={e=>setInputs({...inputs,loanAmount:e.target.value})} type="number" placeholder={ltype?ltype.minAmount:"500000"} style={{width:"100%",padding:10,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,marginTop:6}}/>
                </div>
                <div>
                  <label style={{color:"#8892b0",fontSize:13}}>Tenure (months)</label>
                  <input value={inputs.loanTenure||""} onChange={e=>setInputs({...inputs,loanTenure:e.target.value})} type="number" placeholder={ltype?ltype.maxTenure:"120"} style={{width:"100%",padding:10,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,marginTop:6}}/>
                </div>
              </div>
              {emi&&<div style={{background:"#0d3321",border:"1px solid #38a169",borderRadius:8,padding:12,marginBottom:16,textAlign:"center"}}><div style={{color:"#8892b0",fontSize:13}}>Monthly EMI</div><div style={{color:"#68d391",fontSize:22,fontWeight:700}}>{fmt(emi)}</div></div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setModal(null)} style={{flex:1,padding:12,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#8892b0",cursor:"pointer"}}>Cancel</button>
                <button onClick={applyLoan} style={{flex:2,padding:12,background:"#e53e3e",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}}>Apply Now</button>
              </div>
            </>}
            {modal==="stock"&&<>
              <h3 style={{color:"#fff",marginBottom:20}}>📈 Buy Stocks (NSE)</h3>
              <label style={{color:"#8892b0",fontSize:13}}>Select Stock</label>
              <select value={inputs.selectedStock||""} onChange={e=>setInputs({...inputs,selectedStock:e.target.value})} style={{width:"100%",padding:12,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,marginTop:6,marginBottom:12}}>
                <option value="">Choose stock</option>
                {STOCKS.map(s=><option key={s.id} value={s.id}>{s.id} — ₹{prices[s.id].toLocaleString("en-IN")}</option>)}
              </select>
              <label style={{color:"#8892b0",fontSize:13}}>Quantity</label>
              <input value={inputs.stockQty||""} onChange={e=>setInputs({...inputs,stockQty:e.target.value})} type="number" placeholder="1" min="1" style={{width:"100%",padding:12,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,marginTop:6,marginBottom:12}}/>
              {stockPrice>0&&<div style={{background:"#0d3321",border:"1px solid #38a169",borderRadius:8,padding:12,marginBottom:16,textAlign:"center"}}><div style={{color:"#8892b0",fontSize:13}}>Total Cost</div><div style={{color:"#68d391",fontSize:22,fontWeight:700}}>₹{(stockPrice*stockQty).toLocaleString("en-IN")}</div></div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setModal(null)} style={{flex:1,padding:12,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#8892b0",cursor:"pointer"}}>Cancel</button>
                <button onClick={buyStock} style={{flex:2,padding:12,background:"#38a169",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}}>Buy Stock 📈</button>
              </div>
            </>}
            {modal==="fd"&&<>
              <h3 style={{color:"#fff",marginBottom:20}}>🏦 Fixed Deposit</h3>
              <label style={{color:"#8892b0",fontSize:13}}>Deposit Amount (₹)</label>
              <input value={inputs.fdAmount||""} onChange={e=>setInputs({...inputs,fdAmount:e.target.value})} type="number" placeholder="100000" style={{width:"100%",padding:12,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,marginTop:6,marginBottom:12}}/>
              <label style={{color:"#8892b0",fontSize:13}}>Tenure (months)</label>
              <input value={inputs.fdMonths||""} onChange={e=>setInputs({...inputs,fdMonths:e.target.value})} type="number" placeholder="12" min="1" max="120" style={{width:"100%",padding:12,background:"#0f1117",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:14,marginTop:6,marginBottom:12}}/>
              {fdAmt>0&&<div style={{background:"#2d1b0e",border:"1px solid #dd6b20",borderRadius:8,padding:12,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#8892b0",fontSize:13}}>Interest Rate</span><span style={{color:"#f5a623"}}>7% p.a.</span></div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}><span style={{color:"#8892b0",fontSize:13}}>Maturity Amount</span><span style={{color:"#dd6b20",fontWeight:700,fontSize:16}}>₹{Math.round(fdMat).toLocaleString("en-IN")}</span></div>
              </div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setModal(null)} style={{flex:1,padding:12,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#8892b0",cursor:"pointer"}}>Cancel</button>
                <button onClick={depositFD} style={{flex:2,padding:12,background:"#dd6b20",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontWeight:600,fontSize:14}}>Create FD 🏦</button>
              </div>
            </>}
          </div>
        </div>
      )}

      <div style={{position:"fixed",bottom:20,right:20,display:"flex",flexDirection:"column",gap:8,zIndex:300}}>
        {notifs.map(n=>(
          <div key={n.id} style={{background:n.type==="error"?"#3d1515":n.type==="success"?"#0d3321":"#1a2540",border:`1px solid ${n.type==="error"?"#e53e3e":n.type==="success"?"#38a169":"#4a5568"}`,borderRadius:10,padding:"10px 16px",color:"#fff",fontSize:13,maxWidth:280,animation:"slideIn 0.3s ease"}}>
            {n.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
